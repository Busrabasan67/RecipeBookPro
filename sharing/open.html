<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RecipeBook</title>
<style>
body{font-family:system-ui,sans-serif;padding:20px;line-height:1.5;max-width:28rem;margin:0 auto;color:#222}
h1{font-size:1.1rem}
a{color:#1565c0;word-break:break-all}
.small{color:#666;font-size:.9rem;margin-top:1.5rem}
</style>
</head>
<body>
<noscript>
  <h1>RecipeBook</h1>
  <p>Bu bağlantının çalışması için tarayıcıda JavaScript açık olmalıdır.</p>
  <p><a href="https://play.google.com/store/apps/details?id=com.recipebookpro">RecipeBook’u Play Store’dan indirin</a></p>
</noscript>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var k=p.get('k');
  var id=p.get('id');
  var pkg='com.recipebookpro';

  function play(){return 'https://play.google.com/store/apps/details?id='+encodeURIComponent(pkg);}

  function fail(msg){
    document.body.innerHTML='<h1>RecipeBook</h1><p>'+msg+'</p>'
      +'<p><a href="'+play()+'">Uygulamayı indir</a></p>';
  }

  if((k!=='recipe'&&k!=='cookbook')||!id){fail('Geçersiz paylaşım bağlantısı.');return;}
  // Firestore id: güvenli segment; yanlış encode patlaması olmasın
  id=decodeURIComponent(id);
  var appUrl='recipebook://'+encodeURIComponent(k)+'/'+encodeURIComponent(id);

  document.body.innerHTML=''
    +'<h1>RecipeBook</h1>'
    +'<p>Tarayıcı yönlendiriyorsa uygulama açılacak.</p>'
    +'<p><a href="'+appUrl+'"><strong>Uygulamada aç</strong></a></p>'
    +'<p><a href="'+play()+'">Uygulama yoksa — Play Store</a></p>'
    +'<p class="small">Link açılmıyorsa uygulama yüklü olmayabilir veya bağlantıyı kopyalayıp tarayıcıda deneyin.</p>';

  setTimeout(function(){window.location.href=appUrl;},150);
})();
</script>
</body>
</html>
